name: Deployment

on:
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        type: string
      platforms:
        default: "linux,windows"
        type: string
      release:
        description: "Wether to create a GitHub Release"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest

    if: contains(inputs.platforms, 'windows')

    strategy:
      fail-fast: true

      matrix:
        arch: [x86, x64]

    steps:
    - uses: actions/checkout@v6

    # we have to use a specific hash here to refer to a PR that upgrades the
    # action for Node 24
    - name: Enable Developer Command Prompt
      uses: ilammy/msvc-dev-cmd@138b1c783b65ec697d8342918306b7b2db4e88f1
      with:
        arch: ${{ matrix.arch == 'x86' && 'amd64_x86' || 'amd64' }}

    - name: Install WiX v4
      run: |
        dotnet tool install --global wix --version 4.0.4
        wix extension add --global WixToolset.UI.wixext/4.0.4

    - name: Configure CMake
      run: |
        cmake -B build --preset ${{ matrix.arch }}-release

    - name: Build
      run: |
        cmake --build build --config Release

    - name: Create Installer
      run: |
        cmake --build build --config Release --target package

    - name: Create Archive
      run: |
        cd build
        cpack -G ZIP

    - uses: actions/upload-artifact@v7
      with:
        name: windows-${{ matrix.arch }}
        if-no-files-found: error
        retention-days: 7
        path: |
          build/*.msi
          build/*.zip

  linux:
    runs-on: ubuntu-latest

    if: contains(inputs.platforms, 'linux')

    steps:
    - uses: actions/checkout@v6

    - name: Configure CMake
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=ON

    - name: Build
      run: |
        cmake --build build --config Release

    - name: Create Archive
      run: |
        cd build
        cpack -G ZIP

    - uses: actions/upload-artifact@v7
      with:
        name: linux-64
        if-no-files-found: error
        retention-days: 7
        path: |
          build/*.zip

  release:
    runs-on: ubuntu-latest
    needs: [windows, linux]
    if: inputs.release

    steps:
    - uses: actions/checkout@v6

    - name: Merge built artifacts
      uses: actions/download-artifact@v8
      with:
        path: dist
        merge-multiple: true

    - name: Prepare release assets
      shell: bash
      env:
        TAG_NAME: ${{ inputs.tag_name }}
        GH_TOKEN: ${{ github.token }}
      run: |
        pushd dist
        shasum -a 256 * > checksums.txt
        mv checksums.txt absscpi_${TAG_NAME#v}_checksums.txt
        popd

        release_args=(
          "$TAG_NAME"
          --title "${TAG_NAME}"
          --target "$GITHUB_SHA"
          --generate-notes
        )

        # check for e.g., v1.1.0-rc0
        if [[ $TAG_NAME == *-* ]]; then
          release_args+=( --prerelease )
        fi

        scripts/label-assets dist/* | xargs gh release create "${release_args[@]}" --
